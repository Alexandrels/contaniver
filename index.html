<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural & Contagem Regressiva de Aniversário</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #48dbfb;
            --accent-color: #feca57;
            --bg-color: #f7f9fc;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--accent-color) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            color: #2d3436;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            text-shadow: 2px 2px #fff;
            line-height: 1.2;
        }

        /* Seção do Contador */
        .countdown-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border-top: 5px solid var(--secondary-color);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #636e72;
        }

        input[type="date"] {
            padding: 10px;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="date"]:focus {
            border-color: var(--secondary-color);
        }

        #timer {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .timer-unit {
            background: var(--bg-color);
            padding: 10px 15px;
            border-radius: 10px;
            min-width: 70px;
        }

        .timer-unit span {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .timer-unit label {
            font-size: 0.7rem;
            text-transform: uppercase;
            margin: 0;
        }

        /* Seção de Upload e Galeria */
        .upload-area {
            margin: 30px 0;
        }

        .custom-file-upload {
            background: var(--primary-color);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
            display: inline-block;
        }

        .custom-file-upload:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .photo-item {
            aspect-ratio: 1 / 1;
            background-size: cover;
            background-position: center;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Formatos */
        .shape-circle { border-radius: 50%; }
        .shape-flower { clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); border: none; }
        .shape-blob { clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); border: none; }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Ajustes responsivos para telas menores */
        @media (max-width: 768px) {
            body {
                padding: 24px 14px;
            }

            h1 {
                font-size: clamp(1.8rem, 7vw, 2.4rem);
            }

            .countdown-card {
                padding: 18px 14px;
                border-radius: 16px;
            }

            #timer {
                gap: 10px;
                flex-wrap: wrap;
            }

            .timer-unit {
                min-width: 64px;
                padding: 10px 12px;
            }

            .timer-unit span {
                font-size: 1.2rem;
            }

            #gallery {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
            }

            .custom-file-upload {
                width: 100%;
                box-sizing: border-box;
                text-align: center;
            }
        }

        @media (max-width: 420px) {
            body {
                padding: 18px 10px;
            }

            #timer {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .timer-unit {
                min-width: 0;
                width: 100%;
            }

            #gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎈 Festa da Livia Leite esta chegando! 🎂</h1>

        <!-- Seção de Contagem Regressiva -->
        <div class="countdown-card">
            <div class="input-group">
                <label for="birthday-date">Quando é o seu aniversário?</label>
                <input type="date" id="birthday-date">
            </div>
            
            <div id="timer">
                <div class="timer-unit"><span id="days">00</span><label>Dias</label></div>
                <div class="timer-unit"><span id="hours">00</span><label>Horas</label></div>
                <div class="timer-unit"><span id="minutes">00</span><label>Minutos</label></div>
                <div class="timer-unit"><span id="seconds">00</span><label>Segundos</label></div>
            </div>
            <p id="bday-message" style="margin-top: 15px; font-weight: bold; color: var(--primary-color);"></p>
        </div>

        <!-- Seção de Upload -->
        <div class="upload-area">
            <label class="custom-file-upload">
                <input type="file" id="image-input" accept="image/*" multiple style="display:none">
                📸 Adicionar Fotos Memoráveis
            </label>
        </div>

        <div id="gallery"></div>
    </div>

    <script>
        // --- Lógica da Contagem Regressiva ---
        const bdayInput = document.getElementById('birthday-date');
        const messageDisplay = document.getElementById('bday-message');
        let countdownInterval;

        bdayInput.addEventListener('change', () => {
            if(countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(updateCountdown, 1000);
            updateCountdown();
        });

        function updateCountdown() {
            const now = new Date();
            const [year, month, day] = (bdayInput.value || '').split('-').map(Number);

            if (!year || !month || !day) return;

            // Usa a data completa informada (dia, mês e ano) em horário local.
            const selectedDateStart = new Date(year, month - 1, day, 0, 0, 0, 0);
            const selectedDateEnd = new Date(year, month - 1, day, 23, 59, 59, 999);
            const isBirthdayToday = now >= selectedDateStart && now <= selectedDateEnd;

            let diff = 0;

            if (isBirthdayToday) {
                // Conta o tempo restante do dia de aniversário até virar o próximo dia.
                diff = selectedDateEnd.getTime() + 1 - now.getTime();
            } else if (now < selectedDateStart) {
                diff = selectedDateStart.getTime() - now.getTime();
                messageDisplay.innerText = "Seu proximo aniversário";
            } else {
                messageDisplay.innerText = "Seu aniversário já passou";
            }

            diff = Math.max(0, diff);

            // Cálculo matemático do tempo
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            // Atualiza o DOM
            document.getElementById('days').innerText = String(d).padStart(2, '0');
            document.getElementById('hours').innerText = String(h).padStart(2, '0');
            document.getElementById('minutes').innerText = String(m).padStart(2, '0');
            document.getElementById('seconds').innerText = String(s).padStart(2, '0');

            if (isBirthdayToday) {
                messageDisplay.innerText = "Hoje é seu aniversario";
            }
        }

        // --- Lógica da Galeria ---
        const imageInput = document.getElementById('image-input');
        const gallery = document.getElementById('gallery');
        const shapes = ['shape-circle', 'shape-flower', 'shape-blob'];

        imageInput.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const div = document.createElement('div');
                    div.className = `photo-item ${shapes[Math.floor(Math.random() * shapes.length)]}`;
                    div.style.backgroundImage = `url(${event.target.result})`;
                    gallery.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        });
    </script>
</body>
</html>
